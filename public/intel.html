<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAG Intelligence Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0d12;
            --card: rgba(20, 26, 34, 0.85);
            --gold: #ffd600;
            --green: #00e676;
            --red: #ff1744;
            --blue: #448aff;
            --purple: #b388ff;
            --cyan: #00e5ff;
            --text: #e1e1e1;
            --dim: #8a9099;
            --border: rgba(255,255,255,0.06);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(0,230,118,0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255,214,0,0.02) 0%, transparent 40%);
            color: var(--text);
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 25px 20px; }

        /* Header */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 22px; margin-bottom: 25px;
            background: var(--card); border-radius: 14px; border: 1px solid var(--border);
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, var(--gold), #ff6d00);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Outfit'; font-weight: bold; font-size: 16px; color: #000;
        }
        h1 { font-family: 'Outfit'; font-size: 20px; }
        .header-meta { color: var(--dim); font-size: 12px; }
        .nav-btns { display: flex; gap: 10px; }
        .btn {
            background: var(--card); color: #fff; border: 1px solid var(--border);
            padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 12px; font-weight: 600;
        }
        .btn:hover { border-color: var(--gold); }

        /* Stock Banner */
        .stock-banner {
            display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
            padding: 14px 20px; margin-bottom: 25px;
            background: var(--card); border-radius: 12px; border: 1px solid var(--border);
        }
        .stock-price { font-family: 'Outfit'; font-size: 28px; font-weight: 700; color: var(--green); }
        .stock-change { font-size: 14px; font-weight: 700; padding: 4px 10px; border-radius: 6px; }
        .stock-change.up { background: rgba(0,230,118,0.12); color: var(--green); }
        .stock-change.down { background: rgba(255,23,68,0.12); color: var(--red); }
        .stock-meta { color: var(--dim); font-size: 12px; }
        .stock-label { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Section */
        .section {
            margin-bottom: 30px;
        }
        .section-header {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 18px; margin-bottom: 15px;
            background: var(--card); border-radius: 12px; border: 1px solid var(--border);
        }
        .section-icon {
            width: 32px; height: 32px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
        }
        .section-title { font-family: 'Outfit'; font-size: 16px; font-weight: 700; }
        .section-count { color: var(--dim); font-size: 12px; margin-right: auto; }

        /* Article Card */
        .article {
            background: var(--card); border-radius: 12px; border: 1px solid var(--border);
            padding: 18px; margin-bottom: 12px;
            display: flex; flex-direction: column; gap: 8px;
            transition: border-color 0.2s;
        }
        .article:hover { border-color: rgba(255,214,0,0.3); }
        .article-top { display: flex; justify-content: space-between; align-items: center; }
        .article-date { font-family: 'Outfit'; font-size: 12px; color: var(--gold); }
        .article-source {
            font-size: 10px; padding: 2px 8px; border-radius: 4px;
            background: rgba(68,138,255,0.1); color: var(--blue);
        }
        .article-title {
            font-size: 15px; font-weight: 600; color: #fff;
            direction: ltr; text-align: left; line-height: 1.4;
        }
        .article-title a { color: #fff; text-decoration: none; }
        .article-title a:hover { color: var(--gold); }
        .article-summary {
            font-size: 13px; line-height: 1.6; color: var(--text);
            padding: 10px 12px; background: rgba(255,255,255,0.03);
            border-radius: 8px; border-right: 2px solid var(--purple);
        }

        /* X Intelligence */
        .x-section {
            background: var(--card); border-radius: 14px; border: 1px solid var(--border);
            padding: 20px; margin-bottom: 25px;
        }
        .x-header { display: flex; align-items: center; gap: 8px; margin-bottom: 15px; }
        .x-badge {
            background: #000; color: #fff; padding: 3px 8px;
            border-radius: 6px; font-size: 11px; font-weight: 700; border: 1px solid #333;
        }
        .x-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; }
        .x-card {
            background: rgba(0,0,0,0.3); border-radius: 10px; padding: 14px;
            border-right: 3px solid var(--gold);
        }
        .x-card-title { font-size: 12px; font-weight: 700; color: var(--gold); margin-bottom: 6px; text-transform: uppercase; }
        .x-card-body { font-size: 13px; line-height: 1.5; }
        .sentiment { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; margin-top: 6px; }
        .s-pos { background: rgba(0,230,118,0.15); color: var(--green); }
        .s-neg { background: rgba(255,23,68,0.15); color: var(--red); }
        .s-neu { background: rgba(138,144,153,0.15); color: var(--dim); }

        /* No data */
        .no-data { text-align: center; padding: 40px; color: var(--dim); font-size: 14px; }

        @media (max-width: 600px) {
            .stock-banner { flex-direction: column; align-items: flex-start; }
            .x-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <header class="header">
        <div class="logo">
            <div class="logo-icon">B</div>
            <h1>BRAG<span style="color:var(--gold);font-weight:400"> INTEL REPORT</span></h1>
        </div>
        <div class="header-meta" id="report-date"></div>
        <div class="nav-btns">
            <a href="index.html" class="btn">דשבורד ראשי</a>
            <a href="history.html" class="btn">היסטוריה</a>
        </div>
    </header>

    <!-- Stock Banner -->
    <div class="stock-banner" id="stock-banner"></div>

    <!-- X Intelligence -->
    <div class="x-section" id="x-section" style="display:none">
        <div class="x-header">
            <span class="x-badge">X</span>
            <span style="font-family:'Outfit';font-size:16px;font-weight:700">מודיעין מ-X (Twitter)</span>
        </div>
        <div class="x-grid" id="x-grid"></div>
    </div>

    <!-- Section 1: BRAG Official -->
    <div class="section" id="section-brag"></div>

    <!-- Section 2: iGaming Market -->
    <div class="section" id="section-igaming"></div>

    <!-- Section 3: US / New York -->
    <div class="section" id="section-us"></div>

    <!-- Section 4: Netherlands -->
    <div class="section" id="section-nl"></div>

    <!-- Section 5: Brazil -->
    <div class="section" id="section-brazil"></div>

    <!-- Section 6: Social Media -->
    <div class="section" id="section-social"></div>
</div>

<script src="intel-data.js"></script>
<script>
const now = new Date();
document.getElementById('report-date').innerText =
    now.toLocaleDateString('he-IL') + ' | ' + now.toLocaleTimeString('he-IL', {hour:'2-digit',minute:'2-digit'});

const data = window.intelData || {};

// Stock Banner
const sb = document.getElementById('stock-banner');
const stock = data.stock || {};
if (stock.price) {
    const changeClass = parseFloat(stock.change) >= 0 ? 'up' : 'down';
    const arrow = parseFloat(stock.change) >= 0 ? '\u2191' : '\u2193';
    sb.innerHTML = `
        <div><div class="stock-label">NASDAQ: BRAG</div><div class="stock-price">$${stock.price}</div></div>
        <div class="stock-change ${changeClass}">${arrow} ${stock.change} (${stock.changePercent})</div>
        <div><div class="stock-label">TSX: BRAG</div><div style="font-family:'Outfit';font-size:18px;font-weight:700">$${stock.priceTSX || '-'}</div></div>
        <div><div class="stock-label">52W Range</div><div style="font-size:13px">${stock.low52w || '-'} - ${stock.high52w || '-'}</div></div>
        <div><div class="stock-label">Volume</div><div style="font-size:13px">${stock.volume || '-'}</div></div>
        <div class="stock-meta">Updated: ${stock.updatedAt || '-'}</div>
    `;
}

// X Intelligence
const xIntel = data.xIntelligence || null;
if (xIntel && typeof xIntel === 'object') {
    document.getElementById('x-section').style.display = 'block';
    const grid = document.getElementById('x-grid');
    const topics = [
        {key:'brag_stock',title:'מניית BRAG'},
        {key:'us_regulation',title:'רגולציה - ארה"ב'},
        {key:'brazil_market',title:'שוק ברזיל'},
        {key:'netherlands_ksa',title:'הולנד / KSA'},
        {key:'igaming_industry',title:'תעשיית iGaming'}
    ];
    topics.forEach(t => {
        const info = xIntel[t.key];
        if (!info) return;
        const sc = (info.sentiment||'').includes('חיובי') ? 's-pos' :
                   (info.sentiment||'').includes('שלילי') ? 's-neg' : 's-neu';
        const card = document.createElement('div');
        card.className = 'x-card';
        card.innerHTML = `
            <div class="x-card-title">${t.title}</div>
            <div class="x-card-body">${info.summary||'אין מידע'}</div>
            ${info.breaking && info.breaking !== 'אין' && info.breaking !== '-' ?
                `<div style="margin-top:6px;font-size:11px;color:var(--red)">\u26A0 ${info.breaking}</div>` : ''}
            <span class="sentiment ${sc}">${info.sentiment||'ניטרלי'}</span>
        `;
        grid.appendChild(card);
    });
}

// Render sections
function renderSection(containerId, section) {
    if (!section) return;
    const container = document.getElementById(containerId);
    const articles = (section.articles || []).sort((a,b) => new Date(b.date) - new Date(a.date));

    let html = `
        <div class="section-header">
            <div class="section-icon" style="background:${section.color || 'rgba(255,214,0,0.15)'}">
                ${section.icon || ''}
            </div>
            <div class="section-title">${section.title}</div>
            <div class="section-count">${articles.length} כתבות</div>
        </div>
    `;

    if (articles.length === 0) {
        html += '<div class="no-data">אין כתבות מ-7 הימים האחרונים</div>';
    }

    articles.forEach(a => {
        html += `
            <div class="article">
                <div class="article-top">
                    <span class="article-date">${a.date || ''}</span>
                    <span class="article-source">${a.source || ''}</span>
                </div>
                <div class="article-title"><a href="${a.url || '#'}" target="_blank">${a.title}</a></div>
                <div class="article-summary">${a.summary_he}</div>
            </div>
        `;
    });

    container.innerHTML = html;
}

const sections = data.sections || {};
renderSection('section-brag', sections.brag_official);
renderSection('section-igaming', sections.igaming_market);
renderSection('section-us', sections.us_regulation);
renderSection('section-nl', sections.netherlands);
renderSection('section-brazil', sections.brazil);
renderSection('section-social', sections.social_media);
</script>
</body>
</html>
