<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAG Intelligence Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0d12;
            --card-bg: rgba(20, 26, 34, 0.85);
            --accent-green: #00e676;
            --accent-red: #ff1744;
            --accent-gold: #ffd600;
            --accent-blue: #448aff;
            --accent-purple: #b388ff;
            --text-main: #e1e1e1;
            --text-dim: #8a9099;
            --glass-border: rgba(255, 255, 255, 0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 15% 25%, rgba(0, 230, 118, 0.04) 0%, transparent 40%),
                radial-gradient(circle at 85% 75%, rgba(255, 214, 0, 0.03) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
        }

        .dashboard { max-width: 1500px; margin: 0 auto; padding: 30px 20px; }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 18px 25px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        .logo-area { display: flex; align-items: center; gap: 14px; }

        .logo-icon {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, var(--accent-gold), #ff6d00);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Outfit', sans-serif;
            font-weight: bold; font-size: 18px; color: #000;
            box-shadow: 0 0 20px rgba(255, 214, 0, 0.3);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            letter-spacing: -0.5px;
        }

        .header-info { color: var(--text-dim); font-size: 13px; font-weight: 600; }

        .controls { display: flex; gap: 12px; }

        .btn {
            background: var(--card-bg);
            color: white;
            border: 1px solid var(--glass-border);
            padding: 9px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            font-size: 13px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-gold);
        }

        /* X Intelligence Section */
        .x-intel-section {
            margin-bottom: 30px;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            padding: 25px;
        }

        .x-intel-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-family: 'Outfit', sans-serif;
            font-size: 18px;
            font-weight: 700;
        }

        .x-badge {
            background: #000;
            color: #fff;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid #333;
        }

        .intel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        .intel-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 16px;
            border-right: 3px solid var(--accent-gold);
        }

        .intel-card-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent-gold);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .intel-card-body { font-size: 14px; line-height: 1.6; color: var(--text-main); }

        .sentiment-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            margin-top: 8px;
        }

        .sentiment-positive { background: rgba(0, 230, 118, 0.15); color: var(--accent-green); }
        .sentiment-negative { background: rgba(255, 23, 68, 0.15); color: var(--accent-red); }
        .sentiment-neutral { background: rgba(138, 144, 153, 0.15); color: var(--text-dim); }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 18px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            text-align: center;
        }

        .stat-value {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-green);
            margin-bottom: 4px;
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Alert Banner */
        .alert-banner {
            background: linear-gradient(135deg, rgba(255, 214, 0, 0.1), rgba(255, 109, 0, 0.1));
            border: 1px solid rgba(255, 214, 0, 0.3);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 25px;
            display: none;
        }

        .alert-banner.visible { display: flex; align-items: center; gap: 12px; }

        .alert-icon { font-size: 20px; }
        .alert-text { font-size: 14px; font-weight: 600; color: var(--accent-gold); }

        /* Trends Grid */
        .trends-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 20px;
        }

        @media (max-width: 500px) {
            .trends-grid { grid-template-columns: 1fr; }
            .intel-grid { grid-template-columns: 1fr; }
        }

        .trend-card {
            background: var(--card-bg);
            border-radius: 18px;
            border: 1px solid var(--glass-border);
            padding: 22px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
        }

        .trend-card:hover {
            border-color: rgba(0, 230, 118, 0.3);
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .trend-card::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 4px; height: 100%;
            background: var(--accent-green);
        }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }

        .category-tag {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            background: rgba(0, 230, 118, 0.1);
            color: var(--accent-green);
            border: 1px solid rgba(0, 230, 118, 0.2);
        }

        .score-tag {
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            color: var(--accent-gold);
            font-weight: bold;
        }

        .source-tag {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(68, 138, 255, 0.1);
            color: var(--accent-blue);
            margin-right: 8px;
        }

        .trend-title {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            text-align: left;
            direction: ltr;
            line-height: 1.4;
        }

        .content-summary {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.03);
            padding: 14px;
            border-radius: 10px;
            border-right: 2px solid var(--accent-purple);
        }

        .discussion-section { margin-top: auto; }

        .discussion-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .discussion-content {
            font-size: 13px;
            color: var(--text-dim);
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 10px;
        }

        .discussion-content ul { margin: 0; padding-right: 18px; }
        .discussion-content li { margin-bottom: 4px; }

        .card-footer { display: flex; justify-content: flex-end; padding-top: 8px; }

        .link-icon {
            color: var(--accent-blue);
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
        }

        .link-icon:hover { color: #fff; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>

<body>
    <div class="dashboard">
        <header class="header">
            <div class="logo-area">
                <div class="logo-icon">B</div>
                <h1>BRAG<span style="color: var(--accent-gold); font-weight: 400;"> INTEL</span></h1>
            </div>
            <div class="header-info" id="runtime"></div>
            <div class="controls">
                <a href="intel.html" class="btn" style="background:linear-gradient(135deg,rgba(255,214,0,0.2),rgba(255,109,0,0.2));border-color:rgba(255,214,0,0.3)">דוח מודיעין</a>
                <a href="history.html" class="btn">היסטוריה</a>
            </div>
        </header>

        <!-- Alert Banner -->
        <div class="alert-banner" id="alert-banner">
            <span class="alert-icon">&#9888;</span>
            <span class="alert-text" id="alert-text"></span>
        </div>

        <!-- X Intelligence Section -->
        <div class="x-intel-section" id="x-intel-section" style="display:none;">
            <div class="x-intel-header">
                <span class="x-badge">X</span>
                <span>מודיעין מ-X (Twitter) - Grok</span>
            </div>
            <div class="intel-grid" id="intel-grid"></div>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value" id="count-total">0</div>
                <div class="stat-label">פוסטים</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" style="color: var(--accent-gold);">48h</div>
                <div class="stat-label">חלון זמן</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" style="color: var(--accent-blue);" id="top-subreddit">-</div>
                <div class="stat-label">קהילה מובילה</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" style="color: var(--accent-purple);" id="x-sentiment">-</div>
                <div class="stat-label">סנטימנט X</div>
            </div>
        </div>

        <!-- Trends Grid -->
        <div class="trends-grid" id="trends-container"></div>
    </div>

    <script src="data.js"></script>
    <script>
        // Update runtime
        const now = new Date();
        document.getElementById('runtime').innerText = now.toLocaleDateString('he-IL') + ' | ' + now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });

        const data = window.dashboardData || {};
        const trends = data.trends || [];
        const xIntel = data.xIntelligence || null;

        // X Intelligence Section
        if (xIntel && typeof xIntel === 'object' && !xIntel.raw_response) {
            const section = document.getElementById('x-intel-section');
            section.style.display = 'block';
            const grid = document.getElementById('intel-grid');

            const topics = [
                { key: 'brag_stock', title: 'מניית BRAG' },
                { key: 'us_regulation', title: 'רגולציה - ארה"ב' },
                { key: 'brazil_market', title: 'שוק ברזיל' },
                { key: 'netherlands_ksa', title: 'הולנד / KSA' },
                { key: 'igaming_industry', title: 'תעשיית iGaming' }
            ];

            topics.forEach(topic => {
                const info = xIntel[topic.key];
                if (!info) return;

                const card = document.createElement('div');
                card.className = 'intel-card';

                const sentimentClass = (info.sentiment || '').includes('חיובי') ? 'sentiment-positive' :
                    (info.sentiment || '').includes('שלילי') ? 'sentiment-negative' : 'sentiment-neutral';

                card.innerHTML = `
                    <div class="intel-card-title">${topic.title}</div>
                    <div class="intel-card-body">${info.summary || 'אין מידע'}</div>
                    ${info.breaking && info.breaking !== 'אין' && info.breaking !== '-' ?
                        `<div style="margin-top:8px;font-size:12px;color:var(--accent-red);">&#9888; ${info.breaking}</div>` : ''}
                    <span class="sentiment-tag ${sentimentClass}">${info.sentiment || 'ניטרלי'}</span>
                `;
                grid.appendChild(card);
            });

            // Overall sentiment
            if (xIntel.overall_sentiment) {
                document.getElementById('x-sentiment').innerText = xIntel.overall_sentiment;
            }

            // Top alert
            if (xIntel.top_alert && xIntel.top_alert !== 'אין') {
                const banner = document.getElementById('alert-banner');
                document.getElementById('alert-text').innerText = xIntel.top_alert;
                banner.classList.add('visible');
            }
        } else if (xIntel && xIntel.raw_response) {
            // Fallback for raw text response
            const section = document.getElementById('x-intel-section');
            section.style.display = 'block';
            const grid = document.getElementById('intel-grid');
            grid.innerHTML = `<div class="intel-card" style="grid-column:1/-1;">
                <div class="intel-card-title">סיכום מ-X</div>
                <div class="intel-card-body" style="white-space:pre-wrap;">${xIntel.raw_response}</div>
            </div>`;
        }

        // Trends
        const container = document.getElementById('trends-container');

        if (trends.length > 0) {
            document.getElementById('count-total').innerText = trends.length;

            const subMap = {};
            trends.forEach(t => subMap[t.subreddit] = (subMap[t.subreddit] || 0) + 1);
            const topSub = Object.keys(subMap).reduce((a, b) => subMap[a] > subMap[b] ? a : b);
            document.getElementById('top-subreddit').innerText = topSub;

            trends.forEach(trend => {
                const card = document.createElement('div');
                card.className = 'trend-card';

                const discussionHtml = trend.comments_summary_he ?
                    trend.comments_summary_he.split('\n').map(l => l.trim()).filter(l => l).map(l => `<li>${l.replace(/^[*-]\s*/, '')}</li>`).join('') :
                    '<li>אין סיכום דיון זמין.</li>';

                card.innerHTML = `
                    <div class="card-header">
                        <div>
                            <span class="source-tag">Reddit</span>
                            <span class="category-tag">${trend.category_he || 'כללי'}</span>
                        </div>
                        <span class="score-tag">&#8593; ${(trend.score || 0).toLocaleString()}</span>
                    </div>
                    <div class="trend-title">${trend.title}</div>
                    <div class="content-summary">${trend.summary_he}</div>
                    <div class="discussion-section">
                        <div class="discussion-label">&#128172; דעות מהקהילה</div>
                        <div class="discussion-content"><ul>${discussionHtml}</ul></div>
                    </div>
                    <div class="card-footer">
                        <a href="${trend.url}" target="_blank" class="link-icon">&#8592; קרא עוד ב-Reddit</a>
                    </div>
                `;
                container.appendChild(card);
            });
        } else {
            container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:80px;color:var(--text-dim);font-size:16px;">אין נתונים להצגה כרגע. הרץ את הג\'וב היומי לעדכון.</div>';
        }
    </script>
</body>

</html>
